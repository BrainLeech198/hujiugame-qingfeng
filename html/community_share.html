<!DOCTYPE html>
<html lang="zh">
<head>
    <link rel="icon" type="image/x-icon" href="../favicon.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
    <title data-i18n="community_page_title">氢风 · 社区分享</title>
    <style>
        /* 样式与之前完全一致，略作微调以支持多按钮 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #eef2f6 0%, #d9e2ec 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 30px 20px;
        }

        .main-wrapper {
            max-width: 1200px;
            width: 100%;
            background-color: rgba(255,255,255,0.7);
            backdrop-filter: blur(12px);
            border-radius: 56px;
            box-shadow: 0 30px 50px -20px rgba(0,30,50,0.3), 0 0 0 1px rgba(255,255,255,0.8) inset;
            padding: 40px;
            border: 1px solid rgba(255,255,255,0.9);
            transition: all 0.3s ease;
        }
        .main-wrapper:hover {
            box-shadow: 0 40px 60px -15px rgba(20,80,120,0.4);
        }

        .community-header {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            margin-bottom: 35px;
            gap: 15px;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(4px);
            padding: 12px 28px;
            border-radius: 50px;
            border: 1px solid rgba(70,120,160,0.4);
            color: #1d4d6b;
            text-decoration: none;
            font-weight: 500;
            font-size: 1.2rem;
            transition: all 0.2s;
            box-shadow: 0 6px 12px rgba(0,20,30,0.05);
        }
        .back-link:hover {
            background: white;
            border-color: #2f6b8f;
            color: #083445;
            transform: translateX(-3px);
        }
        .back-link span {
            font-size: 1.5rem;
            line-height: 1;
        }

        .page-title {
            font-size: 2.6rem;
            font-weight: 600;
            color: #0d4057;
            letter-spacing: 1px;
            position: relative;
            display: inline-block;
        }
        .page-title::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 0;
            width: 80px;
            height: 4px;
            background: linear-gradient(90deg, #2f6b8f, #b1d0e8);
            border-radius: 4px;
        }

        .discussion-card {
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 32px 36px;
            margin: 20px 0;
            box-shadow: 0 15px 25px -12px rgba(0,30,50,0.2);
            border: 1px solid rgba(255,255,255,0.8);
            transition: all 0.25s;
        }
        .discussion-card:hover {
            background: rgba(255,255,255,0.85);
            box-shadow: 0 20px 30px -12px #1c4e6e;
            transform: translateY(-3px);
        }

        .discussion-title {
            font-size: 2rem;
            font-weight: 700;
            color: #0b3b4e;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #164863, #2b5f7a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .discussion-description {
            font-size: 1.2rem;
            line-height: 1.6;
            color: #1e3a4a;
            margin-bottom: 25px;
        }

        .discussion-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 10px;
        }
        .discussion-button {
            display: inline-block;
            background: linear-gradient(135deg, #2f6b8f, #1a5f7a);
            color: white;
            padding: 12px 28px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            text-decoration: none;
            box-shadow: 0 8px 16px -6px rgba(20,80,120,0.4);
            transition: all 0.2s;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .discussion-button:hover {
            background: linear-gradient(135deg, #1a5f7a, #0f4a62);
            transform: translateY(-2px);
            box-shadow: 0 12px 20px -8px rgba(20,80,120,0.5);
        }

        .loading-skeleton {
            color: #7a9eb5;
            font-style: italic;
            animation: pulse 1.5s infinite ease-in-out;
        }
        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        .error-message {
            text-align: center;
            padding: 50px 20px;
            background: rgba(255,255,255,0.5);
            border-radius: 50px;
            color: #b52b2b;
            font-size: 1.3rem;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,120,120,0.3);
        }

        .footnote {
            max-width: 1200px;
            width: 100%;
            margin-top: 40px;
            text-align: center;
            color: #4f6f8a;
            font-size: 1rem;
            border-top: 1px solid rgba(90,130,160,0.25);
            padding-top: 28px;
            backdrop-filter: blur(4px);
        }
        .footnote a {
            color: #1f5f83;
            text-decoration: none;
            border-bottom: 1px dotted;
            transition: color 0.2s;
            font-weight: 500;
        }
        .footnote a:hover {
            color: #083445;
            border-bottom-style: solid;
        }

        @media (max-width: 700px) {
            .main-wrapper { padding: 25px 20px; }
            .page-title { font-size: 2.2rem; }
            .discussion-card { padding: 24px; }
            .discussion-title { font-size: 1.7rem; }
            .discussion-description { font-size: 1rem; }
            .discussion-button { padding: 10px 20px; font-size: 1rem; }
            .footnote { margin-top: 30px; }
        }
    </style>
</head>
<body>
<div class="main-wrapper">
    <div class="community-header">
        <a href="../index.html" class="back-link">
            <span>←</span> <span data-i18n="back_home">返回首页</span>
        </a>
        <div class="page-title" data-i18n="community_page_title">💬 社区分享</div>
    </div>

    <div id="discussionContainer" class="discussion-card">
        <div class="loading-skeleton" style="text-align:center; padding:40px;" data-i18n="loading_community">加载社区信息中...</div>
    </div>
</div>

<div class="footnote">
    <span data-i18n="footer_text">⚡ 氢风启动器 · 官方站</span>    |    <a href="../index.html" data-i18n="back_home">返回首页</a>
</div>

<script>
    (function() {
        // ==================== i18n 初始化 ====================
        let currentMessages = null;
        const localeMap = {
            'zh': 'zh',
            'zh-CN': 'zh',
            'zh-TW': 'zh-TW',
            'zh-HK': 'zh-TW',
            'en': 'en',
            'ja': 'ja',
            'ko': 'ko',
            'ru': 'ru',
            'pt': 'pt',
            'fr': 'fr',
            'de': 'de'
        };
        const defaultLang = 'zh';

        function getBrowserLang() {
            const lang = navigator.language || navigator.userLanguage;
            const baseLang = lang.split('-')[0];
            return localeMap[baseLang] ? baseLang : defaultLang;
        }

        function loadMessages(lang) {
            return fetch(`../data/locales/${lang}.json`, { cache: 'no-cache' })
                .then(res => {
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    return res.json();
                })
                .catch(err => {
                    console.warn(`加载语言文件 ${lang} 失败，回退到 ${defaultLang}`, err);
                    if (lang !== defaultLang) return loadMessages(defaultLang);
                    throw err;
                });
        }

        function applyI18n(messages) {
            currentMessages = messages;
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (messages[key]) el.textContent = messages[key];
            });
            if (messages.community_page_title) document.title = messages.community_page_title;
        }

        // ==================== 加载社区数据 ====================
        const container = document.getElementById('discussionContainer');

        function showError(message) {
            const errorMsg = currentMessages?.error_load_failed || '加载失败：';
            container.innerHTML = `<div class="error-message">❌ ${errorMsg}${message}</div>`;
        }

        function getPlatformDisplayName(platformKey) {
            // 尝试从语言文件中获取平台名称，否则简单处理
            const key = `discussion_platform_${platformKey}`;
            if (currentMessages && currentMessages[key]) {
                return currentMessages[key];
            }
            // 默认将首字母大写
            return platformKey.charAt(0).toUpperCase() + platformKey.slice(1);
        }

        function renderDiscussion(data) {
            // 兼容旧格式（如果直接是字符串）和新格式（对象）
            let suggestions = data.discussions?.suggestions;
            if (!suggestions) {
                showError(currentMessages?.no_discussion_link || '未找到讨论区链接');
                return;
            }
            // 如果 suggestions 是字符串（旧格式），转换为单对象
            if (typeof suggestions === 'string') {
                suggestions = { github: suggestions };
            }
            const platforms = Object.entries(suggestions);
            if (platforms.length === 0) {
                showError(currentMessages?.no_discussion_link || '未找到讨论区链接');
                return;
            }

            const title = currentMessages?.suggestions_title || "Feature Suggestions & Improvements – Let's Build Together!";
            const description = currentMessages?.suggestions_description || "我们非常重视每一位用户的反馈。欢迎您在这里提出功能建议、改进意见或分享您的创作。请保持文明、友善的交流。";

            let buttonsHtml = '';
            for (const [platform, url] of platforms) {
                const platformName = getPlatformDisplayName(platform);
                const buttonText = currentMessages?.suggestions_button_template
                    ? currentMessages.suggestions_button_template.replace('{platform}', platformName)
                    : `前往 ${platformName} 讨论区 →`;
                buttonsHtml += `<a href="${url}" class="discussion-button" target="_blank" rel="noopener">${buttonText}</a>`;
            }

            container.innerHTML = `
                <div class="discussion-title">${title}</div>
                <div class="discussion-description">${description}</div>
                <div class="discussion-buttons">${buttonsHtml}</div>
            `;
        }

        function fetchCommunityData() {
            fetch('../data/community.json', { cache: 'no-cache' })
                .then(response => {
                    if (!response.ok) throw new Error(`HTTP ${response.status} - ${response.statusText}`);
                    return response.json();
                })
                .then(data => renderDiscussion(data))
                .catch(error => showError(error.message));
        }

        // 启动流程
        const userLang = getBrowserLang();
        loadMessages(userLang).then(messages => {
            applyI18n(messages);
            fetchCommunityData();
        }).catch(err => {
            console.error('i18n 初始化失败', err);
            // 使用硬编码中文继续
            fetchCommunityData();
        });
    })();
</script>
</body>
</html>
