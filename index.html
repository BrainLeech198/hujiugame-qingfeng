<!DOCTYPE html>
<html lang="zh">
<head>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
    <title data-i18n="site_title">氢风 · 官网</title>
    <style>
        /* 样式与原版完全一致，此处省略以节省篇幅，实际使用请保留完整样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #eef2f6 0%, #d9e2ec 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
        }

        .hero-card {
            max-width: 1100px;
            width: 100%;
            background: rgba(255,255,255,0.9);
            border-radius: 40px;
            padding: 30px 20px;
            margin-bottom: 30px;
            box-shadow: 0 15px 30px -15px rgba(0,35,70,0.15);
            text-align: center;
            border: 1px solid rgba(255,255,255,0.8);
            backdrop-filter: blur(4px);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .hero-card:hover {
            transform: scale(1.01);
            box-shadow: 0 20px 35px -12px rgba(0,45,80,0.2);
        }

        .logo-img {
            width: 600px;
            max-width: 90%;
            height: auto;
            display: block;
            margin: 0 auto 15px auto;
            border-radius: 28px;
            filter: drop-shadow(0 8px 15px rgba(0,30,50,0.1));
            transition: filter 0.2s;
        }
        .logo-img:hover {
            filter: drop-shadow(0 12px 20px rgba(0,50,70,0.15));
        }

        .app-title {
            font-size: 2.6rem;
            font-weight: 600;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #0b3b4e, #2f6b8f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-top: 8px;
            text-shadow: 0 2px 5px rgba(255,255,255,0.5);
        }

        .tip-card {
            max-width: 1100px;
            width: 100%;
            background: rgba(255,255,255,0.8);
            border-radius: 40px;
            padding: 20px 30px;
            margin-bottom: 30px;
            box-shadow: 0 15px 30px -15px rgba(0,35,70,0.15);
            border: 1px solid rgba(255,255,255,0.8);
            backdrop-filter: blur(4px);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }
        .tip-text {
            font-size: 1.2rem;
            color: #1d4d6b;
            line-height: 1.5;
            flex: 1;
            min-width: 250px;
        }
        .tip-text .highlight {
            font-weight: 600;
            color: #0b3b4e;
        }
        .tip-btn {
            background: linear-gradient(135deg, #2f6b8f, #1a5f7a);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 8px 16px -6px rgba(20,80,120,0.4);
            transition: all 0.2s;
            white-space: nowrap;
            border: 1px solid rgba(255,255,255,0.3);
            text-decoration: none;
            display: inline-block;
        }
        .tip-btn:hover {
            background: linear-gradient(135deg, #1a5f7a, #0f4a62);
            transform: translateY(-2px);
            box-shadow: 0 12px 20px -8px rgba(20,80,120,0.5);
        }

        .card {
            max-width: 1100px;
            width: 100%;
            background-color: rgba(255,255,255,0.7);
            backdrop-filter: blur(12px);
            border-radius: 56px;
            box-shadow: 0 30px 50px -20px rgba(0,30,50,0.3), 0 0 0 1px rgba(255,255,255,0.8) inset;
            padding: 40px 35px 50px 35px;
            border: 1px solid rgba(255,255,255,0.9);
            transition: all 0.3s ease;
        }
        .card:hover {
            box-shadow: 0 40px 60px -15px rgba(20,80,120,0.4);
        }

        .download-card {
            margin-bottom: 30px;
        }

        .download-header, .share-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding: 0 10px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .download-header h2, .share-header h2 {
            font-size: 2.2rem;
            font-weight: 600;
            color: #0d4057;
            letter-spacing: 1px;
            position: relative;
            display: inline-block;
        }
        .download-header h2::after, .share-header h2::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 0;
            width: 70px;
            height: 4px;
            background: linear-gradient(90deg, #2f6b8f, #b1d0e8);
            border-radius: 4px;
        }
        .history-link {
            font-size: 1.2rem;
            background: rgba(255,255,255,0.6);
            padding: 10px 28px;
            border-radius: 50px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(70,120,160,0.4);
            transition: all 0.2s;
            color: #1d4d6b;
            text-decoration: none;
            font-weight: 500;
            box-shadow: 0 6px 12px rgba(0,20,30,0.05);
            white-space: nowrap;
        }
        .history-link:hover {
            background: white;
            border-color: #2f6b8f;
            color: #083445;
            box-shadow: 0 12px 20px -8px rgba(20,80,120,0.3);
            transform: translateY(-2px);
        }

        .download-panels {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-top: 15px;
        }

        .platform-box {
            background: rgba(255,255,255,0.65);
            backdrop-filter: blur(10px);
            border-radius: 36px;
            padding: 30px 20px;
            box-shadow: 0 15px 25px -12px rgba(0,30,50,0.2);
            border: 1px solid rgba(255,255,255,0.8);
            height: fit-content;
        }
        .platform-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            align-items: flex-start;
        }
        .download-item {
            flex: 1 1 200px;
            min-width: 160px;
            text-align: center;
            background: rgba(255,255,255,0.8);
            border-radius: 28px;
            padding: 22px 15px 18px 15px;
            transition: 0.25s;
            border: 1px solid rgba(255,255,255,0.9);
            box-shadow: 0 5px 10px rgba(0,0,0,0.02);
        }
        .download-item:hover {
            background: white;
            box-shadow: 0 20px 25px -12px #1c4e6e;
            transform: translateY(-6px);
        }
        .download-item a {
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .download-icon {
            width: 100%;
            max-width: 170px;
            height: auto;
            border-radius: 24px;
            transition: 0.15s;
            border: 1px solid rgba(150,180,200,0.3);
            background-color: #eef4f9;
            min-height: 80px;
            object-fit: contain;
        }
        .download-icon.error {
            background: #d9e2ec;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #2f627c;
            font-size: 1rem;
            padding: 20px 0;
        }
        .download-item span {
            font-size: 1.3rem;
            font-weight: 550;
            color: #1d4d6b;
            background: rgba(230,240,250,0.8);
            padding: 6px 18px;
            border-radius: 40px;
            width: fit-content;
            margin: 0 auto;
            border: 1px solid rgba(80,130,170,0.2);
            backdrop-filter: blur(2px);
        }

        .changelog-box {
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(10px);
            border-radius: 36px;
            padding: 30px;
            box-shadow: 0 15px 25px -12px rgba(0,35,55,0.25);
            border: 1px solid rgba(255,255,255,0.8);
            display: flex;
            flex-direction: column;
        }
        .changelog-header {
            border-bottom: 2px dashed #a0c4d9;
            padding-bottom: 18px;
            margin-bottom: 22px;
        }
        .version-badge {
            font-size: 2rem;
            font-weight: 700;
            color: #0b3b4e;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            word-break: break-word;
        }
        .version-badge .tag {
            background: #1a5f7a;
            color: white;
            font-size: 1rem;
            padding: 6px 18px;
            border-radius: 50px;
            font-weight: 400;
            white-space: nowrap;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .log-content {
            font-size: 1.25rem;
            line-height: 1.6;
            color: #1e3a4a;
            background: #f3f9ff;
            padding: 22px 25px;
            border-radius: 28px;
            border: 1px solid #c7ddee;
            white-space: pre-wrap;
            word-break: break-word;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.02);
            min-height: 120px;
        }

        .loading-skeleton {
            color: #7a9eb5;
            font-style: italic;
            animation: pulse 1.5s infinite ease-in-out;
        }
        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        .footnote {
            max-width: 1100px;
            width: 100%;
            margin-top: 35px;
            text-align: center;
            color: #4f6f8a;
            font-size: 1rem;
            border-top: 1px solid rgba(90,130,160,0.25);
            padding-top: 25px;
            backdrop-filter: blur(4px);
        }
        .footnote a {
            color: #1f5f83;
            text-decoration: none;
            border-bottom: 1px dotted;
            transition: color 0.2s;
            font-weight: 500;
        }
        .footnote a:hover {
            color: #083445;
            border-bottom-style: solid;
        }

        @media (max-width: 700px) {
            .hero-card { padding: 20px 12px; }
            .tip-card { padding: 20px; flex-direction: column; text-align: center; }
            .card { padding: 25px 18px; }
            .app-title { font-size: 2rem; }
            .download-panels { grid-template-columns: 1fr; }
            .download-header, .share-header { flex-direction: column; align-items: flex-start; }
            .history-link { align-self: flex-start; white-space: normal; }
            .version-badge { font-size: 1.7rem; }
            .share-header h2 { font-size: 1.7rem; }
            .footnote { margin-top: 25px; }
            .download-card { margin-bottom: 20px; }
        }
        @media (max-width: 400px) {
            .platform-grid { flex-direction: column; align-items: center; }
            .log-content { font-size: 1.1rem; }
        }
    </style>
</head>

<script>
    (function() {
        // ==================== i18n 初始化 ====================
        let currentMessages = null;
        const localeMap = {
    		'zh': 'zh',        
    		'zh-CN': 'zh',
   		 'zh-TW': 'zh-TW', 
    		'zh-HK': 'zh-TW',
    		'en': 'en',
    		'ja': 'ja',
   		 'ko': 'ko',
   		 'ru': 'ru',
    		'pt': 'pt',
    		'fr': 'fr',
    		'de': 'de'
	};
	const defaultLang = 'zh';

        function getBrowserLang() {
            const lang = navigator.language || navigator.userLanguage;
            const baseLang = lang.split('-')[0];
            return localeMap[baseLang] ? baseLang : defaultLang;
        }

        function loadMessages(lang) {
            return fetch(`data/locales/${lang}.json`, { cache: 'no-cache' })
                .then(res => {
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    return res.json();
                })
                .catch(err => {
                    console.warn(`加载语言文件 ${lang} 失败，回退到 ${defaultLang}`, err);
                    if (lang !== defaultLang) return loadMessages(defaultLang);
                    throw err;
                });
        }

        function applyI18n(messages) {
            currentMessages = messages;
            // 替换所有带有 data-i18n 属性的元素文本
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (messages[key]) {
                    // 保留原有 HTML 结构（如 emoji、加粗等）？这里简单替换文本，但可以保留内部 HTML 结构
                    // 由于部分元素内包含子元素，我们仅替换纯文本节点？更安全的方式是使用 innerText 或 textContent
                    // 为了避免破坏内部 HTML，我们只替换文本内容（但如果有嵌套元素，可能丢失样式）。此处简化：直接设置 textContent
                    el.textContent = messages[key];
                }
            });
            // 处理修复指引卡片中的混合文本（含 <span> 和 <strong>）
            const tipWattTextSpan = document.querySelector('.tip-card:first-child .tip-text span:last-child');
            if (tipWattTextSpan && messages.tip_watt_text) {
                // 保留 <strong>Watt Toolkit</strong> 结构
                const text = messages.tip_watt_text;
                const strongMatch = /<strong>(.*?)<\/strong>/.exec(text);
                if (strongMatch) {
                    tipWattTextSpan.innerHTML = text;
                } else {
                    tipWattTextSpan.textContent = text;
                }
            }
            const tipRepairTextSpan = document.querySelector('.tip-card:last-child .tip-text span:last-child');
            if (tipRepairTextSpan && messages.tip_repair_text) {
                tipRepairTextSpan.textContent = messages.tip_repair_text;
            }
            // 更新页面标题
            if (messages.site_title) document.title = messages.site_title;
        }

        // 修复指引按钮的 alert 文本需要动态替换
        function bindRepairButton() {
            const repairBtn = document.querySelector('.tip-card:last-child .tip-btn');
            if (repairBtn) {
                repairBtn.onclick = () => {
                    alert(currentMessages.alert_repair_click);
                };
            }
        }

        // ==================== 原有功能 ====================
        const CONFIG = {
            VERSION_DATA_PATH: 'data/versions.json',
            IMAGE_CONFIG_PATH: 'data/image.json'
        };

        const versionNameEl = document.getElementById('version-name');
        const versionLogEl = document.getElementById('version-log');
        const windowsLink = document.getElementById('windows-link');
        const androidLink = document.getElementById('android-link');

        const logoImg = document.getElementById('logoImg');
        const windowsIcon = document.getElementById('windowsIcon');
        const androidIcon = document.getElementById('androidIcon');

        function loadImageConfig() {
            fetch(CONFIG.IMAGE_CONFIG_PATH, { cache: 'no-cache' })
                .then(response => {
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    return response.json();
                })
                .then(config => {
                    if (logoImg && config.logo) logoImg.src = config.logo;
                    if (windowsIcon && config['download-windows']) windowsIcon.src = config['download-windows'];
                    if (androidIcon && config['download-android']) androidIcon.src = config['download-android'];
                })
                .catch(err => console.warn('图片配置加载失败，使用默认路径', err));
        }

        function setLoadingState() {
            if (versionNameEl && currentMessages) versionNameEl.textContent = currentMessages.loading_version;
            if (versionLogEl && currentMessages) versionLogEl.innerHTML = `<span class="loading-skeleton">${currentMessages.loading_log}</span>`;
        }

        function showError(message) {
            if (versionNameEl) versionNameEl.textContent = '❌ ' + (currentMessages?.error_load_failed || '加载失败：') + message;
            if (versionLogEl) versionLogEl.innerHTML = `<span style="color:#b52b2b;">${message}</span>`;
        }

        function fetchVersionAndUpdate() {
            setLoadingState();

            fetch(CONFIG.VERSION_DATA_PATH, { cache: 'no-cache' })
                .then(response => {
                    if (!response.ok) throw new Error(`HTTP ${response.status} - ${response.statusText}`);
                    return response.json();
                })
                .then(data => {
                    const newestKey = data.newest_version;
                    if (newestKey === undefined || !data.versions) throw new Error('JSON 缺少 newest_version 或 versions 字段');
                    const versionInfo = data.versions[String(newestKey)];
                    if (!versionInfo || !versionInfo.name) throw new Error(`未找到键 ${newestKey} 对应的版本信息`);

                    if (versionNameEl) {
                        versionNameEl.textContent = versionInfo.name;
                        versionNameEl.classList.remove('loading-skeleton');
                    }
                    if (versionLogEl) {
                        versionLogEl.textContent = versionInfo.log;
                        versionLogEl.classList.remove('loading-skeleton');
                    }

                    const windowsUrl = versionInfo.download?.windows?.github || null;
                    const androidUrl = versionInfo.download?.android?.github || null;

                    if (windowsLink) {
                        if (windowsUrl) {
                            windowsLink.href = windowsUrl;
                            windowsLink.removeAttribute('download');
                            windowsLink.target = '_blank';
                            windowsLink.rel = 'noopener';
                        } else {
                            windowsLink.href = '#';
                            windowsLink.onclick = (e) => {
                                e.preventDefault();
                                alert(currentMessages?.alert_windows_missing || 'Windows 版下载链接未配置，请联系管理员。');
                            };
                        }
                    }

                    if (androidLink) {
                        if (androidUrl) {
                            androidLink.href = androidUrl;
                            androidLink.removeAttribute('download');
                            androidLink.target = '_blank';
                            androidLink.rel = 'noopener';
                        } else {
                            androidLink.href = '#';
                            androidLink.onclick = (e) => {
                                e.preventDefault();
                                alert(currentMessages?.alert_android_missing || 'Android 版下载链接未配置，请联系管理员。');
                            };
                        }
                    }
                })
                .catch(error => showError(error.message));
        }

        // 启动流程：先加载语言，再加载图片和版本数据
        const userLang = getBrowserLang();
        loadMessages(userLang).then(messages => {
            applyI18n(messages);
            bindRepairButton();
            loadImageConfig();
            fetchVersionAndUpdate();
        }).catch(err => {
            console.error('i18n 初始化失败', err);
            // 继续加载其他内容（使用硬编码中文）
            loadImageConfig();
            fetchVersionAndUpdate();
        });
    })();
</script>
</body>
</html>
